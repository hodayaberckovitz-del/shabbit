<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שבית - ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FDF6EC; --cream-light: #FFFBF3; --cream-dark: #F5EAD2;
  --sage: #6FAB5F; --sage-dark: #4C8A3E; --sage-light: #D1EBC5;
  --terracotta: #E87A4F; --terracotta-light: #FBD4BF;
  --warm-gray: #A8A196; --warm-gray-light: #E5DFD2;
  --ink: #2D2A24; --ink-soft: #4A463D; --muted: #8B8578; --white: #FFFFFF;
  --coral: #E96B8B; --coral-light: #FBD2DC;
  --sky: #5BA8D6; --sky-light: #C9E5F5;
  --sunshine: #F4C14E; --sunshine-light: #FDEDC4;
  --lavender: #9B7EBD; --lavender-light: #E2D5F0;
  --mint: #4FC3A1;
  --shadow-soft: 0 2px 12px rgba(45, 42, 36, 0.06);
}

body {
  font-family: 'Assistant', -apple-system, sans-serif;
  background: linear-gradient(135deg, #FCE8DC 0%, #F5E6F1 50%, #E0F0F5 100%);
  color: var(--ink); min-height: 100vh; padding: 0;
}

.app {
  max-width: 440px; margin: 0 auto; background: var(--cream);
  min-height: 100vh; position: relative; padding-bottom: 20px;
  box-shadow: 0 0 80px rgba(0,0,0,0.1);
}

.header {
  padding: 20px 20px 14px;
  background: linear-gradient(135deg, var(--cream) 0%, #FFE8D5 100%);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(168, 161, 150, 0.15);
  display: flex; justify-content: space-between; align-items: center;
}

.header-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 22px; font-weight: 500;
}

.back-btn {
  background: var(--white); border: 1px solid var(--warm-gray-light);
  border-radius: 12px; padding: 8px 16px; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--ink-soft);
  cursor: pointer; transition: all 0.2s;
}
.back-btn:hover { background: var(--cream-dark); }

.section { padding: 20px 20px 0; }
.section:last-child { padding-bottom: 20px; }
.section-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 18px; font-weight: 500; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}

.section-divider {
  height: 1px; background: var(--warm-gray-light); margin: 0 20px;
}

.badge {
  background: var(--coral); color: var(--white);
  font-size: 11px; font-weight: 700; padding: 2px 8px;
  border-radius: 100px; font-family: 'Assistant', sans-serif;
}

.card {
  background: var(--white); border-radius: 16px; padding: 14px 16px;
  margin-bottom: 10px; box-shadow: var(--shadow-soft);
  border: 1px solid rgba(168, 161, 150, 0.1);
  display: flex; align-items: center; gap: 12px;
}

.card.pending { border-right: 3px solid var(--terracotta); }

.card-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: var(--white); flex-shrink: 0;
}

.card-avatar.pending { background: linear-gradient(135deg, var(--terracotta) 0%, var(--coral) 100%); }
.card-avatar.approved { background: linear-gradient(135deg, var(--sage) 0%, var(--mint) 100%); }
.card-avatar.admin { background: linear-gradient(135deg, var(--sky) 0%, #7AB8DD 100%); }
.card-avatar.house { background: linear-gradient(135deg, var(--sunshine) 0%, var(--terracotta) 100%); }
.card-avatar.request { background: linear-gradient(135deg, var(--lavender) 0%, var(--coral) 100%); }

.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 600; color: var(--ink); }
.card-sub { font-size: 12px; color: var(--muted); }
.card-detail { font-size: 11px; color: var(--warm-gray); }

.card-actions { display: flex; gap: 6px; flex-shrink: 0; }

.action-btn {
  width: 38px; height: 38px; border-radius: 12px; border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: all 0.2s;
}
.action-btn:active { transform: scale(0.9); }

.action-btn.approve { background: var(--sage-light); color: var(--sage-dark); }
.action-btn.approve:hover { background: var(--sage); color: var(--white); }

.action-btn.reject { background: var(--coral-light); color: var(--coral); }
.action-btn.reject:hover { background: var(--coral); color: var(--white); }

.status-tag {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 100px; display: inline-block;
}
.status-tag.admin { background: var(--sky-light); color: var(--sky); }
.status-tag.approved { background: var(--sage-light); color: var(--sage-dark); }
.status-tag.pending { background: var(--sunshine-light); color: #8A5F10; }
.status-tag.available { background: var(--sage-light); color: var(--sage-dark); }
.status-tag.unavailable { background: var(--warm-gray-light); color: var(--ink-soft); }
.status-tag.request-approved { background: var(--sage-light); color: var(--sage-dark); }
.status-tag.request-rejected { background: var(--coral-light); color: var(--coral); }

.empty-state {
  text-align: center; padding: 24px 20px; color: var(--muted);
}
.empty-state-icon { font-size: 32px; margin-bottom: 4px; }
.empty-state-text { font-size: 13px; }

/* Settings card */
.settings-card {
  background: var(--white); border-radius: 16px; padding: 16px;
  box-shadow: var(--shadow-soft); border: 1px solid rgba(168, 161, 150, 0.1);
}

.settings-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.settings-row:last-child { margin-bottom: 0; }

.settings-label { font-size: 13px; color: var(--muted); font-weight: 600; white-space: nowrap; }

.settings-input {
  flex: 1; padding: 10px 14px; border-radius: 12px;
  border: 1.5px solid var(--warm-gray-light); font-family: inherit;
  font-size: 15px; color: var(--ink); background: var(--cream-light);
  outline: none; direction: ltr; text-align: right;
}
.settings-input:focus { border-color: var(--sage); }

.settings-btn {
  padding: 10px 18px; border-radius: 12px; border: none;
  background: var(--ink); color: var(--cream-light);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.settings-btn:hover { background: var(--ink-soft); }
.settings-btn:active { transform: scale(0.97); }

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--cream-light);
  padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 1000;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-title">ניהול שבית</div>
    <button class="back-btn" onclick="window.location.href='/app.html'">חזרה למפה</button>
  </header>

  <!-- Pending Users -->
  <div class="section">
    <div class="section-title">
      ממתינות לאישור
      <span class="badge" id="pendingBadge" style="display:none">0</span>
    </div>
    <div id="pendingList"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Approved Users -->
  <div class="section">
    <div class="section-title">משתמשות מאושרות</div>
    <div id="approvedList"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Houses -->
  <div class="section">
    <div class="section-title">בתים</div>
    <div id="housesList"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Requests -->
  <div class="section">
    <div class="section-title">בקשות אירוח</div>
    <div id="requestsList"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">הגדרות</div>
    <div class="settings-card">
      <div class="settings-row">
        <span class="settings-label">קוד כניסה:</span>
        <input type="text" class="settings-input" id="accessCodeInput" placeholder="טוען...">
        <button class="settings-btn" onclick="changeCode()">שמור</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('shabbit_token');
const userData = JSON.parse(localStorage.getItem('shabbit_user') || '{}');

if (!token) window.location.href = '/';
if (!userData.is_admin) { alert('גישה למנהלות בלבד'); window.location.href = '/app.html'; }

function getHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== Load All Data ====================
async function loadAll() {
  await Promise.all([loadUsers(), loadHouses(), loadRequests(), loadCode()]);
}

// ==================== Users ====================
async function loadUsers() {
  try {
    const res = await fetch('/api/auth/users', { headers: getHeaders() });
    if (res.status === 401) { window.location.href = '/'; return; }
    if (res.status === 403) { alert('גישה למנהלות בלבד'); window.location.href = '/app.html'; return; }
    const users = await res.json();

    const pending = users.filter(u => !u.approved && u.approved !== 'rejected' && !u.is_admin);
    const approved = users.filter(u => u.approved === true || u.is_admin);

    renderPending(pending);
    renderApproved(approved);
  } catch (err) {
    console.error('Load users error:', err);
  }
}

function renderPending(users) {
  const el = document.getElementById('pendingList');
  const badge = document.getElementById('pendingBadge');

  if (users.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-text">אין בקשות ממתינות</div></div>';
    badge.style.display = 'none';
    return;
  }

  badge.textContent = users.length;
  badge.style.display = '';

  el.innerHTML = users.map(u => `
    <div class="card pending">
      <div class="card-avatar pending">${(u.name || '?').substring(0, 2)}</div>
      <div class="card-info">
        <div class="card-name">${u.name}</div>
        <div class="card-sub">${u.phone}</div>
        <div class="card-detail">נרשמה: ${u.created_at}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn approve" onclick="approveUser('${u.phone}')" title="אישור">✓</button>
        <button class="action-btn reject" onclick="rejectUser('${u.phone}')" title="דחייה">✗</button>
      </div>
    </div>
  `).join('');
}

function renderApproved(users) {
  const el = document.getElementById('approvedList');

  if (users.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div class="empty-state-text">אין משתמשות</div></div>';
    return;
  }

  el.innerHTML = users.map(u => {
    const avatarClass = u.is_admin ? 'admin' : 'approved';
    const tag = u.is_admin
      ? '<span class="status-tag admin">מנהלת</span>'
      : '<span class="status-tag approved">מאושרת</span>';
    const removeBtn = u.is_admin ? '' :
      `<div class="card-actions"><button class="action-btn reject" onclick="removeUser('${u.phone}')" title="הסרה">✗</button></div>`;

    return `
    <div class="card">
      <div class="card-avatar ${avatarClass}">${(u.name || '?').substring(0, 2)}</div>
      <div class="card-info">
        <div class="card-name">${u.name} ${tag}</div>
        <div class="card-sub">${u.phone}</div>
      </div>
      ${removeBtn}
    </div>
  `;}).join('');
}

async function approveUser(phone) {
  try {
    const res = await fetch(`/api/auth/approve/${encodeURIComponent(phone)}`, {
      method: 'PATCH', headers: getHeaders()
    });
    if (res.ok) { showToast('המשתמשת אושרה ✓'); loadUsers(); }
    else { const err = await res.json(); alert(err.error); }
  } catch (err) { console.error('Approve error:', err); }
}

async function rejectUser(phone) {
  if (!confirm('בטוחה שרוצה לדחות את הבקשה?')) return;
  try {
    const res = await fetch(`/api/auth/reject/${encodeURIComponent(phone)}`, {
      method: 'DELETE', headers: getHeaders()
    });
    if (res.ok) { showToast('הבקשה נדחתה'); loadUsers(); }
    else { const err = await res.json(); alert(err.error); }
  } catch (err) { console.error('Reject error:', err); }
}

async function removeUser(phone) {
  if (!confirm('בטוחה שרוצה להסיר את המשתמשת? היא תצטרך לבקש אישור מחדש.')) return;
  try {
    const res = await fetch(`/api/auth/reject/${encodeURIComponent(phone)}`, {
      method: 'DELETE', headers: getHeaders()
    });
    if (res.ok) { showToast('המשתמשת הוסרה'); loadUsers(); }
    else { const err = await res.json(); alert(err.error); }
  } catch (err) { console.error('Remove error:', err); }
}

// ==================== Houses ====================
async function loadHouses() {
  try {
    const res = await fetch('/api/houses', { headers: getHeaders() });
    const houses = await res.json();
    renderHouses(houses);
  } catch (err) { console.error('Load houses error:', err); }
}

function renderHouses(houses) {
  const el = document.getElementById('housesList');

  if (houses.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏠</div><div class="empty-state-text">אין בתים</div></div>';
    return;
  }

  el.innerHTML = houses.map(h => {
    const statusTag = h.is_available
      ? '<span class="status-tag available">פנוי</span>'
      : '<span class="status-tag unavailable">סגור</span>';

    return `
    <div class="card">
      <div class="card-avatar house">🏠</div>
      <div class="card-info">
        <div class="card-name">${h.name} ${statusTag}</div>
        <div class="card-sub">בעלים: ${h.owner_name} · ${h.city}</div>
        <div class="card-detail">${h.bedrooms} חדרים · ${h.beds} מיטות · עד ${h.max_kids} ילדים</div>
      </div>
    </div>
  `;}).join('');
}

// ==================== Requests ====================
async function loadRequests() {
  try {
    const res = await fetch('/api/requests', { headers: getHeaders() });
    const data = await res.json();
    renderRequests(data);
  } catch (err) { console.error('Load requests error:', err); }
}

function renderRequests(data) {
  const el = document.getElementById('requestsList');
  const all = [...(data.sent || []), ...(data.received || [])];

  if (all.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">אין בקשות עדיין</div></div>';
    return;
  }

  el.innerHTML = all.map(r => {
    let statusTag;
    if (r.status === 'approved') statusTag = '<span class="status-tag request-approved">אושר</span>';
    else if (r.status === 'rejected') statusTag = '<span class="status-tag request-rejected">נדחה</span>';
    else statusTag = '<span class="status-tag pending">ממתין</span>';

    const direction = r.type === 'sent' ? 'שלחתי בקשה' : 'קיבלתי בקשה';

    return `
    <div class="card">
      <div class="card-avatar request">📨</div>
      <div class="card-info">
        <div class="card-name">${r.house_name} ${statusTag}</div>
        <div class="card-sub">${direction} · טלפון: ${r.guest_phone}</div>
        <div class="card-detail">${r.created_at}</div>
      </div>
    </div>
  `;}).join('');
}

// ==================== Settings ====================
async function loadCode() {
  try {
    const res = await fetch('/api/auth/settings/code', { headers: getHeaders() });
    const data = await res.json();
    document.getElementById('accessCodeInput').value = data.code || '';
  } catch (err) { console.error('Load code error:', err); }
}

async function changeCode() {
  const code = document.getElementById('accessCodeInput').value.trim();
  if (!code || code.length < 4) {
    alert('קוד חייב להיות לפחות 4 תווים');
    return;
  }
  try {
    const res = await fetch('/api/auth/settings/code', {
      method: 'PATCH', headers: getHeaders(),
      body: JSON.stringify({ code })
    });
    if (res.ok) { showToast('קוד הכניסה עודכן ✓'); }
    else { const err = await res.json(); alert(err.error); }
  } catch (err) { console.error('Change code error:', err); }
}

// ==================== Start ====================
loadAll();
</script>
</body>
</html>
